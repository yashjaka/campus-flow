openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: CampusFlow API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: students
    description: Student management
  - name: staff
    description: Staff management
  - name: admin
    description: Admin operations
  - name: setup
    description: First-run setup

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/student-entry:
    post:
      operationId: studentEntry
      tags: [auth]
      summary: Student passwordless entry by enrollment number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentEntryInput"
      responses:
        "200":
          description: Auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "404":
          description: Student not found

  /auth/staff-login:
    post:
      operationId: staffLogin
      tags: [auth]
      summary: Faculty or Maintenance Staff login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffLoginInput"
      responses:
        "200":
          description: Auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/admin-login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Campus Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Auth token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  /setup/status:
    get:
      operationId: getSetupStatus
      tags: [setup]
      summary: Check if first-run setup is complete
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"

  /setup/admin:
    post:
      operationId: createAdminSetup
      tags: [setup]
      summary: First-run admin account creation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSetupInput"
      responses:
        "201":
          description: Admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Setup already complete

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Students list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Register a new student
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "409":
          description: Enrollment number already exists

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update student
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create a staff member (faculty or maintenance)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Staff created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "409":
          description: Email already exists

  /staff/{id}:
    get:
      operationId: getStaffMember
      tags: [staff]
      summary: Get staff member by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: Not found
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff member
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated staff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard stats for admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Campus-wide statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/activity:
    get:
      operationId: getRecentActivity
      tags: [admin]
      summary: Recent activity feed
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - token
        - user

    UserProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [student, faculty, maintenance, admin]
        email:
          type: ["string", "null"]
        enrollmentNumber:
          type: ["string", "null"]
        department:
          type: ["string", "null"]
        collegeName:
          type: ["string", "null"]
        semester:
          type: ["integer", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - role
        - createdAt

    StudentEntryInput:
      type: object
      properties:
        enrollmentNumber:
          type: string
      required:
        - enrollmentNumber

    StaffLoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AdminLoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    SetupStatus:
      type: object
      properties:
        setupComplete:
          type: boolean
      required:
        - setupComplete

    AdminSetupInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password

    Student:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        enrollmentNumber:
          type: string
        collegeName:
          type: string
        department:
          type: string
        semester:
          type: integer
        role:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - enrollmentNumber
        - collegeName
        - department
        - semester
        - role
        - createdAt

    StudentInput:
      type: object
      properties:
        name:
          type: string
        enrollmentNumber:
          type: string
        collegeName:
          type: string
        department:
          type: string
        semester:
          type: integer
      required:
        - name
        - enrollmentNumber
        - collegeName
        - department
        - semester

    StudentUpdate:
      type: object
      properties:
        name:
          type: string
        collegeName:
          type: string
        department:
          type: string
        semester:
          type: integer

    StaffMember:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [faculty, maintenance]
        department:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - isActive
        - createdAt

    StaffInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [faculty, maintenance]
        department:
          type: ["string", "null"]
      required:
        - name
        - email
        - password
        - role

    StaffUpdate:
      type: object
      properties:
        name:
          type: string
        department:
          type: ["string", "null"]
        isActive:
          type: boolean

    AdminStats:
      type: object
      properties:
        totalStudents:
          type: integer
        totalFaculty:
          type: integer
        totalMaintenance:
          type: integer
        totalAdmins:
          type: integer
        recentRegistrations:
          type: integer
      required:
        - totalStudents
        - totalFaculty
        - totalMaintenance
        - totalAdmins
        - recentRegistrations

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        description:
          type: string
        actor:
          type: string
        timestamp:
          type: string
      required:
        - id
        - type
        - description
        - actor
        - timestamp
