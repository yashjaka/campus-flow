kind = "web"
previewPath = "/"
title = "CampusFlow"
version = "1.0.0"
id = "artifacts/campusflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23781

[services.development]
run = "pnpm --filter @workspace/campusflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campusflow", "run", "build" ]
publicDir = "artifacts/campusflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23781"
BASE_PATH = "/"
